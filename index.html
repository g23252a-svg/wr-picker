<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WR 챔 셀렉터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f17; --panel:#111a26; --panel2:#0e1620; --line:#1f2e40;
  --ink:#e8eef6; --dim:#7e93ab; --dimmer:#52677d;
  --gold:#d9a441; --gold-soft:#f0c674; --cyan:#39c6c0; --cyan-soft:#6fe3dd;
  --red:#d65a5a; --green:#4caa72;
  --shadow:0 8px 28px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.4}
body{max-width:560px;margin:0 auto;padding:14px 12px 60px;min-height:100vh;
  background:radial-gradient(1200px 500px at 50% -10%, #13202f 0%, var(--bg) 60%)}
h1,h2,h3,.disp{font-family:'Rajdhani',sans-serif;letter-spacing:.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-variant-numeric:tabular-nums}

/* header */
.top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.top h1{font-size:21px;font-weight:700;color:var(--gold-soft);text-transform:uppercase}
.top h1 span{color:var(--cyan)}
.top .sub{font-size:11px;color:var(--dimmer);letter-spacing:.06em;text-transform:uppercase}
.gear{font-size:13px;color:var(--dim);border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-family:'Rajdhani';font-weight:600}
.gear:active{background:var(--panel)}

/* lane bar */
.lanebar{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:13px}
.lane{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 4px 9px;
  text-align:center;transition:.12s;position:relative;overflow:hidden}
.lane .ic{font-size:20px;line-height:1}
.lane .nm{font-family:'Rajdhani';font-weight:600;font-size:12.5px;margin-top:4px;color:var(--dim)}
.lane.on{border-color:var(--gold);background:linear-gradient(180deg,#1c2638,#141d2a)}
.lane.on .nm{color:var(--gold-soft)}
.lane.on::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--gold)}
.lane:active{transform:scale(.96)}

/* inline search */
.searchwrap{position:relative;margin-bottom:13px;z-index:20}
.sbrow{display:flex;align-items:stretch;gap:7px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:5px;transition:.12s}
.searchwrap:focus-within .sbrow{border-color:var(--cyan)}
.sidetog2{display:flex;gap:4px;flex:none}
.sidetog2 button{font-family:'Rajdhani';font-weight:700;font-size:13px;letter-spacing:.02em;
  border:1px solid var(--line);border-radius:8px;padding:0 12px;color:var(--dim);transition:.1s}
.sidetog2 button.on.enemy{border-color:var(--red);color:#2a0c0c;background:var(--red)}
.sidetog2 button.on.ally{border-color:var(--cyan);color:#06201f;background:var(--cyan)}
.sidetog2 button:active{transform:scale(.95)}
#mainSrch{flex:1;min-width:0;background:transparent;border:none;color:var(--ink);font-size:15px;
  font-family:inherit;padding:8px 4px}
#mainSrch:focus{outline:none}
#mainSrch::placeholder{color:var(--dimmer);font-size:13px}
.sbclear{display:none;flex:none;align-items:center;justify-content:center;width:30px;color:var(--dimmer);font-size:14px}
.sbclear:active{color:var(--red)}
.dropdown{display:none;position:absolute;left:0;right:0;top:calc(100% + 6px);background:var(--panel2);
  border:1px solid var(--cyan);border-radius:11px;box-shadow:var(--shadow);overflow:hidden;max-height:60vh;overflow-y:auto}
.dropdown.on{display:block}
.ddrow{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;
  padding:11px 14px;border-bottom:1px solid #13202f;transition:.08s}
.ddrow:last-child{border-bottom:none}
.ddrow:active{background:#1a2536}
.ddrow.first{background:#16202e}
.ddrow.first .ddn{color:var(--cyan-soft)}
.ddn{font-family:'Rajdhani';font-weight:600;font-size:16px}
.ddalias{font-family:'Inter';font-weight:500;font-size:11px;color:var(--dimmer);margin-left:6px;
  border:1px solid var(--line);border-radius:4px;padding:1px 5px;vertical-align:middle}
.ddm{font-size:11px;color:var(--dim);letter-spacing:.02em}
.ddempty{padding:16px;text-align:center;color:var(--dimmer);font-size:13px}

/* team panels */
.picksbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.picksbar .pbl{font-family:'Rajdhani';font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
.clearall{font-family:'Rajdhani';font-weight:600;font-size:12px;color:#f08a8a;
  border:1px solid #3d2230;background:#1c1218;border-radius:8px;padding:6px 12px}
.clearall:active{background:var(--red);border-color:var(--red);color:#fff;transform:scale(.96)}
.teams{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.team{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px}
.team.ally{border-left:3px solid var(--cyan)}
.team.enemy{border-left:3px solid var(--red)}
.team .lbl{font-family:'Rajdhani';font-weight:700;font-size:12px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.team.ally .lbl{color:var(--cyan-soft)}
.team.enemy .lbl{color:#e88}
.chips{display:flex;flex-wrap:wrap;gap:7px;min-height:34px}
.chip{font-size:14px;padding:5px 5px 5px 12px;border-radius:9px;background:#172333;border:1px solid var(--line);
  display:flex;align-items:center;gap:8px;line-height:1}
.chip .x{display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex:none;
  border-radius:7px;background:#2a1620;border:1px solid #3d2230;color:#f08a8a;font-size:18px;font-weight:700;margin-left:2px}
.chip .x:active{background:var(--red);border-color:var(--red);color:#fff;transform:scale(.92)}
.chip .cls{font-size:9.5px;color:var(--dimmer);text-transform:uppercase;letter-spacing:.04em}
.addbtn{font-family:'Rajdhani';font-weight:600;font-size:12px;color:var(--dim);
  border:1px dashed var(--line);border-radius:7px;padding:5px 9px}
.addbtn:active{background:#172333;color:var(--ink)}

/* comp read */
.compread{font-size:11.5px;color:var(--dim);margin:-4px 2px 12px;min-height:16px;line-height:1.5}
.compread b{color:var(--gold-soft);font-weight:600}
.compread .warn{color:#e88}

/* results */
.reshead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 9px}
.reshead .t{font-family:'Rajdhani';font-weight:700;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}
.reshead .mode{font-size:11px;color:var(--dimmer)}
.reshead .mode b{color:var(--cyan)}

.rec{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px;
  display:flex;align-items:center;gap:12px;position:relative;transition:.12s}
.rec.top1{border-color:var(--gold);background:linear-gradient(110deg,#1a2233,#13192488)}
.rec.top1::before{content:"BEST";position:absolute;top:-7px;left:13px;background:var(--gold);color:#1a130a;
  font-family:'Rajdhani';font-weight:700;font-size:9.5px;letter-spacing:.1em;padding:1px 7px;border-radius:4px}
.rk{font-family:'Rajdhani';font-weight:700;font-size:20px;color:var(--dimmer);width:20px;text-align:center;flex:none}
.rec.top1 .rk{color:var(--gold)}
.rmid{flex:1;min-width:0}
.rname{font-family:'Rajdhani';font-weight:700;font-size:18px;line-height:1.1}
.rmeta{font-size:11px;color:var(--dim);margin-top:2px}
.rmeta .tg{color:var(--cyan)}
.rwhy{font-size:11.5px;color:var(--dim);margin-top:5px;line-height:1.45}
.rwhy b{color:var(--gold-soft);font-weight:600}
.rwhy .neg{color:#d98}
.rscore{flex:none;text-align:right}
.rscore .n{font-family:'Rajdhani';font-weight:700;font-size:24px;color:var(--cyan-soft);line-height:1}
.rec.top1 .rscore .n{color:var(--gold-soft)}
.rscore .bd{font-size:9.5px;color:var(--dimmer);margin-top:3px;letter-spacing:.02em}
.empty{text-align:center;color:var(--dimmer);font-size:13px;padding:30px 10px;border:1px dashed var(--line);border-radius:12px}
.legend{font-size:11px;color:var(--dimmer);margin:-3px 2px 10px;line-height:1.4}
.legend b{color:var(--cyan-soft);font-weight:700}
.bd-off{font-family:'Rajdhani';font-weight:700;font-size:10px;letter-spacing:.04em;color:var(--gold-soft);
  border:1px solid #4a3a1e;background:#241c0e;border-radius:4px;padding:1px 6px;margin-left:7px;vertical-align:middle}
.bd-main{font-family:'Rajdhani';font-weight:700;font-size:10px;letter-spacing:.04em;color:var(--cyan-soft);
  border:1px solid #1c4a47;background:#0e2422;border-radius:4px;padding:1px 6px;margin-left:7px;vertical-align:middle}
.rec.offpool .rname{color:var(--gold-soft)}
.bd-role{font-family:'Rajdhani';font-weight:700;font-size:10px;letter-spacing:.04em;color:var(--dim);
  border:1px solid var(--line);background:#141d2a;border-radius:4px;padding:1px 6px;margin-left:7px;vertical-align:middle}
.scopetog{display:flex;gap:7px}
.scopetog button{flex:1;font-family:'Rajdhani';font-weight:700;font-size:13px;border:1px solid var(--line);
  border-radius:8px;padding:9px;color:var(--dim);transition:.1s}
.scopetog button.on{border-color:var(--cyan);color:#06201f;background:var(--cyan)}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(4,8,13,.82);backdrop-filter:blur(3px);display:none;
  align-items:flex-end;z-index:50}
.scrim.on{display:flex}
.sheet{background:var(--panel2);border-top:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;
  max-width:560px;margin:0 auto;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.sheet .hd{padding:14px 15px 10px;border-bottom:1px solid var(--line)}
.sheet .hd .tt{font-family:'Rajdhani';font-weight:700;font-size:15px;letter-spacing:.04em;text-transform:uppercase}
.sheet .hd .tt b{color:var(--cyan)}
.sheet .hd .tt b.en{color:var(--red)}
.sidetog{display:flex;align-items:center;gap:7px}
.sidetog button{font-family:'Rajdhani';font-weight:700;font-size:13px;letter-spacing:.03em;
  border:1px solid var(--line);border-radius:8px;padding:6px 16px;color:var(--dim);transition:.1s}
.sidetog button.on.ally{border-color:var(--cyan);color:#06201f;background:var(--cyan)}
.sidetog button.on.enemy{border-color:var(--red);color:#2a0c0c;background:var(--red)}
.sidetog .counts{margin-left:auto;font-size:11px;color:var(--dimmer);font-family:'Rajdhani';font-weight:600}
.srch{width:100%;margin-top:10px;background:#0a121b;border:1px solid var(--line);border-radius:9px;
  padding:10px 12px;color:var(--ink);font-size:15px;font-family:inherit}
.srch:focus{outline:none;border-color:var(--cyan)}
.grid{overflow-y:auto;padding:10px 12px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.gc{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 8px;text-align:left;transition:.1s}
.gc:active{background:#1a2536;border-color:var(--cyan)}
.gc .gn{font-family:'Rajdhani';font-weight:600;font-size:14px;line-height:1.1}
.gc .gc2{font-size:9.5px;color:var(--dimmer);text-transform:uppercase;margin-top:2px;letter-spacing:.03em}
.sheet .ft{padding:11px 14px;border-top:1px solid var(--line);text-align:center}
.sheet .ft button{font-family:'Rajdhani';font-weight:600;color:var(--dim);font-size:13px;padding:6px 18px}

/* config */
.cfg{padding:6px 14px 18px;overflow-y:auto}
.cfg .grp{margin-top:14px}
.cfg .grp>.gl{font-family:'Rajdhani';font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.wt{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.wt label{font-size:12.5px;width:74px;color:var(--dim)}
.wt input[type=range]{flex:1;accent-color:var(--cyan)}
.wt .v{font-family:'Rajdhani';font-weight:600;width:30px;text-align:right;color:var(--cyan-soft);font-size:13px}
.poolnote{font-size:11.5px;color:var(--dimmer);line-height:1.5;margin-bottom:8px}
.poolrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #13202f}
.poolrow .pn{flex:1;font-size:13px}
.poolrow .pn .pc{font-size:10px;color:var(--dimmer);text-transform:uppercase}
.poolrow input[type=range]{width:110px;accent-color:var(--gold)}
.poolrow .pv{font-family:'Rajdhani';font-weight:600;width:26px;text-align:right;font-size:13px;color:var(--gold-soft)}
.poolrow.off{opacity:.4}
.poolrow .pv.zero{color:var(--dimmer)}
.cfgbtns{display:flex;gap:8px;margin-top:6px}
.cfgbtns button{flex:1;font-family:'Rajdhani';font-weight:600;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:9px;color:var(--dim)}
.cfgbtns button:active{background:var(--panel)}
.lanetabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.lanetabs button{font-family:'Rajdhani';font-weight:600;font-size:12px;border:1px solid var(--line);border-radius:7px;padding:6px 12px;color:var(--dim)}
.lanetabs button.on{border-color:var(--gold);color:var(--gold-soft);background:#1a2233}
.savebar{position:sticky;bottom:0;background:linear-gradient(0deg,var(--panel2),#0e162000);padding:10px 0 4px}
.savebar button{width:100%;background:var(--cyan);color:#06201f;font-family:'Rajdhani';font-weight:700;font-size:15px;letter-spacing:.04em;border-radius:9px;padding:12px;text-transform:uppercase}
.savebar button:active{background:var(--cyan-soft)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--gold);color:#1a130a;
  font-family:'Rajdhani';font-weight:700;font-size:13px;padding:9px 18px;border-radius:9px;opacity:0;pointer-events:none;transition:.25s;z-index:90}
.toast.on{opacity:1}
</style>
</head>
<body>

<div class="top">
  <div>
    <h1>WR <span>챔</span> 셀렉터</h1>
    <div class="sub">Hextech draft engine · 30s lock</div>
  </div>
  <button class="gear" onclick="openCfg()">⚙ 챔폭/가중치</button>
</div>

<div class="lanebar" id="lanebar"></div>

<div class="searchwrap">
  <div class="sbrow">
    <div class="sidetog2">
      <button id="sbEnemy" onclick="setAddSide('enemy')">상대</button>
      <button id="sbAlly" onclick="setAddSide('ally')">우리</button>
    </div>
    <input id="mainSrch" placeholder="챔 검색 → 바로 추가 (ㄴㅁ=나미, Enter=첫 결과)" autocomplete="off">
    <button class="sbclear" id="sbClear" onclick="clearSrch()">✕</button>
  </div>
  <div class="dropdown" id="dd"></div>
</div>

<div class="picksbar" id="picksbar">
  <span class="pbl">현재 픽</span>
  <button class="clearall" id="clearAll" onclick="clearPicks()">✕ 픽 전체 초기화</button>
</div>

<div class="teams">
  <div class="team ally">
    <div class="lbl"><span>우리팀</span></div>
    <div class="chips" id="allyChips"></div>
  </div>
  <div class="team enemy">
    <div class="lbl"><span>상대팀</span></div>
    <div class="chips" id="enemyChips"></div>
  </div>
</div>

<div class="compread" id="compread"></div>

<div class="reshead">
  <div class="t">추천 픽</div>
  <div class="mode" id="modeLbl"></div>
</div>
<div class="legend">점수 = <b>승</b> 승률(참조) + <b>팀</b> 팀 시너지 + <b>카</b> 상성/스킬 &nbsp;(합계가 총점)</div>
<div id="results"></div>

<!-- config sheet -->
<div class="scrim" id="cfgScrim">
  <div class="sheet">
    <div class="hd"><div class="tt">설정 · <b>챔폭 & 가중치</b></div></div>
    <div class="cfg" id="cfgBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

 cls: tank fighter assassin mage marksman enchanter
 dmg: AD AP mixed   rng: m(elee) r(anged)
 tags: engage peel poke dive frontline scaling burst sustain split cc
 lanes + per-lane tier seed (7.1h meta-ish, editable) */
const T={S:'S',A:'A',B:'B',C:'C'};
const C=[

['피오라','Fiora','fighter'==1?[]:['top'],'fighter','AD','m',['split','sustain'],{top:'S'}],
['잭스','Jax',['top','jug'],'fighter','mixed','m',['split','dive','scaling'],{top:'S',jug:'A'}],
['세트','Sett',['top','sup'],'fighter','AD','m',['engage','frontline'],{top:'S',sup:'B'}],
['암베사','Ambessa',['top','jug'],'fighter','AD','m',['dive','engage'],{top:'S',jug:'A'}],
['이렐리아','Irelia',['top','mid'],'fighter','AD','m',['dive','split'],{top:'A',mid:'S'}],
['크산테','K\'Sante',['top'],'tank','AD','m',['frontline','engage','peel'],{top:'A'}],
['오른','Ornn',['top'],'tank','AP','m',['engage','frontline','peel'],{top:'A'}],
['말파이트','Malphite',['top','sup'],'tank','AP','m',['engage','frontline'],{top:'A',sup:'B'}],
['사이온','Sion',['top'],'tank','AD','m',['engage','frontline','poke'],{top:'A'}],
['문도 박사','Dr. Mundo',['top'],'tank','AP','m',['frontline','sustain'],{top:'B'}],

['모데카이저','Mordekaiser',['top'],'fighter','AP','m',['dive','sustain'],{top:'A'}],
['우르곳','Urgot',['top'],'fighter','AD','m',['frontline','dive'],{top:'B'}],
['티모','Teemo',['top'],'marksman','AP','r',['poke','split'],{top:'B'}],
['갱플랭크'==1?'':'쉔','Shen',['top','sup'],'tank','AD','m',['engage','peel','frontline'],{top:'A',sup:'B'}],
['잰나'==1?'':'볼리베어','Volibear',['top','jug'],'fighter','mixed','m',['engage','dive','frontline'],{top:'A',jug:'A'}],
['제이스','Jayce',['top','mid'],'fighter','AD','r',['poke','split'],{top:'B',mid:'B'}],
// JUNGLE
['리 신','Lee Sin',['jug'],'fighter','AD','m',['engage','dive'],{jug:'S'}],
['바이','Vi',['jug'],'fighter','AD','m',['engage','dive'],{jug:'S'}],
['비에고','Viego',['jug'],'assassin','AD','m',['dive','scaling'],{jug:'S'}],
['카직스','Kha\'Zix',['jug'],'assassin','AD','m',['dive','burst'],{jug:'S'}],
['헤카림','Hecarim',['jug'],'fighter','AD','m',['engage','dive','frontline'],{jug:'S'}],
['신 짜오','Xin Zhao',['jug'],'fighter','AD','m',['dive','engage'],{jug:'A'}],
['그레이브즈','Graves',['jug'],'marksman','AD','m',['dive','scaling'],{jug:'S'}],

// 초성(initial consonant) extraction for fast search: 나미 -> "ㄴㅁ"
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(s){let o='';for(const ch of s){const cp=ch.charCodeAt(0);
  if(cp>=0xAC00&&cp<=0xD7A3)o+=CHO[Math.floor((cp-0xAC00)/588)];}return o;}
// is the query made only of standalone 초성 jamo (ㄱ~ㅎ, ignoring spaces)?
function isChoQuery(q){q=q.replace(/\s/g,'');if(!q)return false;
  for(const ch of q){const cp=ch.charCodeAt(0);if(cp<0x3131||cp>0x314E||!CHO.includes(ch))return false;}return true;}

  try{

    antitank:0, poke:t.includes('poke')?1:0, split:t.includes('split')?1:0, burst:t.includes('burst')?1:0,
  };
  return Object.assign(o, KIT[c.en]||{});
}

function compProfile(ids){
  const p={tank:0,fighter:0,assassin:0,mage:0,marksman:0,enchanter:0,ap:0,ad:0,engage:0,peel:0,frontline:0};
  ids.forEach(id=>{const c=byId[id];if(!c)return;
    p[c.cls]++;
    if(c.dmg==='AP')p.ap++; else if(c.dmg==='AD')p.ad++; else {p.ap+=.5;p.ad+=.5;}
    if(c.tags.includes('engage'))p.engage++;
    if(c.tags.includes('peel'))p.peel++;
    if(c.cls==='tank'||c.tags.includes('frontline'))p.frontline++;
  });
  return p;
}

function score(cand){
  const W=weights;
  const comfort = (pool[cand.id]&&pool[cand.id].comfort)||0;
  const hasComfort = comfort>0;
  // comfort is a WEIGHTED axis, never a filter. Off-pool champs get a neutral
  // baseline (50) so a strong meta/counter pick can still rank — just without
  // the mastery bonus. Your mains (70~100) get a real edge, tunable by weight.
  const base = hasComfort ? comfort : 50;
  const cWR = wrOf(cand);
  // 부 라인 픽은 승률(주 라인 기준)을 그대로 못 쓰니 메타 점수 할인 (검증 적은 오프롤)
  const offRole = primeLaneOf(cand)!==state.lane;
  const cTier = metaScore(cWR);

  const allyP=compProfile(state.ally), enemyP=compProfile(state.enemy);
  const k=kitOf(cand);
  const allyK=state.ally.map(id=>kitOf(byId[id]));
  const enemyK=state.enemy.map(id=>kitOf(byId[id]));

  // ---- team synergy ----
  let team=0; const teamNotes=[];
  if(state.ally.length){
    // 구조적 공백 (아군 적게 잠겼을 땐 약화 — 남은 슬롯이 메울 수 있음)
    const fill = Math.min(1, 0.55 + 0.12*state.ally.length); // 4명=1.0, 2명≈0.79
    if(!allyP.tank && cand.cls==='tank'){team+=18*fill;teamNotes.push('탱 공백 메움');}
    else if(allyP.frontline===0 && (cand.cls==='tank'||cand.cls==='fighter'||cand.tags.includes('frontline'))){team+=11*fill;teamNotes.push('프론트라인 보강');}
    if(allyP.engage===0 && k.engage){team+=11*fill;teamNotes.push('이니시 보강');}
    // 데미지 밸런스
    const skewAD=allyP.ad-allyP.ap;
    if(skewAD>=2 && cand.dmg==='AP'){team+=10;teamNotes.push('AP 데미지 분산');}
    if(skewAD<=-2 && cand.dmg==='AD'){team+=10;teamNotes.push('AD 데미지 분산');}
    // 스킬 시너지(콤보)
    if(allyK.some(a=>a.payoff) && k.knockup){team+=14;teamNotes.push('넉업→야스오/요네 궁 콤보');}
    if(k.payoff && allyK.some(a=>a.knockup)){team+=14;teamNotes.push('아군 넉업과 궁 콤보');}
    const allyAoeEngage=allyK.some(a=>a.aoecc&&a.engage);
    const allyAoeDmg=state.ally.some((id,i)=>allyK[i].aoecc||(byId[id].cls==='mage'&&byId[id].tags.includes('burst')));
    let wombo=0,wnote='';
    if(allyAoeEngage && cand.cls==='mage' && cand.tags.includes('burst')){wombo=9;wnote='아군 광역 이니시와 한타 연계';}
    if(k.aoecc&&k.engage && allyAoeDmg){if(wombo<9)wombo=9; if(!wnote)wnote='광역 이니시→아군 폭딜 연계';}
    if(wombo){team+=wombo;teamNotes.push(wnote);}
    // 캐리 보호
    if(allyK.some(a=>a.hypercarry) && k.protect && state.lane==='sup'){team+=11;teamNotes.push('아군 하이퍼캐리 보호');}
    if(k.hypercarry && allyK.some(a=>a.protect) && state.lane==='adc'){team+=9;teamNotes.push('보호받는 캐리');}
    // 락다운 CC 부재 보강
    const allyHardCC=allyK.filter(a=>a.hardcc||a.aoecc||a.ptcc).length;
    if(allyHardCC===0 && (k.hardcc||k.aoecc||k.ptcc)){team+=8*fill;teamNotes.push('팀 CC 보강');}
    // 역할 중복
    if(allyP[cand.cls]>=2 && (cand.cls==='tank'||cand.cls==='assassin')){team-=12;teamNotes.push('역할 중복(-)');}
  }

  // ---- counter ----
  let counter=0; const cNotes=[];
  if(state.enemy.length){
    // 상대 라이너 = 이 라인을 '주 라인'으로 쓰는 적. 플렉스 가능만으론 안 잡음
    // (예: 요네가 탑인데 미드 상대로 오인 방지).
    const laner = state.enemy.map(id=>byId[id]).find(c=>c && primeLaneOf(c)===state.lane);
    if(laner){
      let a=mxAdv(cand.cls,laner.cls)*7;
      if(cand.rng==='r'&&laner.rng==='m')a+=5;       // 원거리 라인 우위
      if(cand.rng==='m'&&laner.rng==='r')a-=4;
      counter+=a;
      if(a>=6)cNotes.push('상대 '+laner.kr+'(추정) 상성 우위');
      else if(a<=-6)cNotes.push('상대 '+laner.kr+'(추정)에 불리(-)');

      // ── 특성 기반 라이너 매치업 (같은 클래스끼리도 갈리게) ──
      const lAllIn  = laner.tags.includes('dive')||laner.tags.includes('engage')||laner.tags.includes('burst');
      const lPoke   = laner.rng==='r' && (laner.tags.includes('poke')||laner.cls==='mage'||laner.cls==='marksman');
      const lScale  = laner.tags.includes('scaling')||(laner.tags.includes('split')&&laner.cls!=='assassin'&&!laner.tags.includes('burst'));
      let nz=0; const lnote=[];
      if(lAllIn){ // 상대가 올인/다이브형 → 버티거나 회피하는 픽이 유리
        if(cand.tags.includes('sustain')){nz+=6;lnote.push('지속력으로 버팀');}
        if(cand.rng==='r'){nz+=6;lnote.push('원거리로 올인 회피');}
        if(cand.tags.includes('split')){nz+=4;lnote.push('사이드 분리');}
        if(cand.cls==='mage'&&cand.rng==='m'){nz-=5;lnote.push('근접 물몸 위험(-)');}
        if(cand.cls==='enchanter'){nz-=3;}
      }
      if(lPoke){ // 상대가 포킹/원거리형 → 파고드는 픽이 유리
        if(cand.tags.includes('dive')||cand.tags.includes('engage')){nz+=6;lnote.push('파고들어 응징');}
        if(cand.tags.includes('sustain')){nz+=3;lnote.push('포킹 버팀');}
        if(cand.rng==='m'&&!cand.tags.includes('dive')&&cand.cls!=='tank'){nz-=4;lnote.push('포킹에 취약(-)');}
      }
      if(lScale){ // 상대가 후반/스플릿형 → 초반에 굴리는 픽이 유리
        if(cand.tags.includes('dive')||cand.tags.includes('engage')){nz+=5;lnote.push('초반에 굴려 격차');}
      }
      counter+=nz;
      if(nz>=5 && lnote.length)cNotes.push('상대 '+laner.kr+'(추정): '+lnote.filter(x=>!x.includes('(-)'))[0]);
      else if(nz<=-4 && lnote.length)cNotes.push('상대 '+laner.kr+'(추정): '+(lnote.find(x=>x.includes('(-)'))||'').replace('(-)',''));
    }
    // ── 팀 단위 상성 (스킬 특성 기반) ──
    const eMobile=enemyK.filter(a=>a.mob>=2).length;                 // 고기동 위협(암살자/다이버)
    const eEngage=enemyK.filter(a=>a.engage||a.aoecc).length;        // 강한 이니시
    const eScale =enemyK.filter(a=>a.curve==='late'||a.hypercarry).length; // 후반 캐리
    const ePoke  =state.enemy.map(id=>byId[id]).filter(c=>c.tags.includes('poke')&&c.rng==='r').length;
    const eFront =state.enemy.map(id=>byId[id]).filter(c=>c.cls==='tank'||c.tags.includes('frontline')).length;
    const eBurst =state.enemy.map((id,i)=>byId[id]).filter(c=>c.cls==='assassin'||c.tags.includes('burst')).length;
    const squishyCand=(cand.cls==='marksman'||cand.cls==='mage'||cand.cls==='enchanter')&&k.mob===0;

    if(eMobile>=2){ // 고기동 다수 → 확정/점착 CC가 잡는다
      if(k.ptcc){counter+=12;cNotes.push('점착 CC로 상대 기동성 봉쇄');}
      else if(k.hardcc||k.aoecc){counter+=6;cNotes.push('CC로 기동성 대응');}
      if(squishyCand){counter-=6;cNotes.push('상대 암살에 물몸 노출(-)');}
    }
    if(eScale>=2){ // 상대 후반캐리 → 초반에 굴려라 (실제 초반 압박/다이브형만)
      if(k.curve==='early'||cand.cls==='assassin'||(cand.tags.includes('dive')&&k.curve!=='late')){counter+=8;cNotes.push('상대 후반캐리 → 초반에 굴리기');}
      else if(k.curve==='late'&&!k.hypercarry){counter-=4;cNotes.push('같이 후반 도모(-)');}
    }
    if(eEngage>=2){ // 상대 강이니시 → 디스인게이지/피해
      if(k.disengage||k.protect){counter+=8;cNotes.push('상대 이니시 → 디스인게이지/보호');}
      if(squishyCand&&!k.disengage){counter-=4;}
    }
    // 상대 포킹 다수 → 파고드는 픽(다이브/고기동)만, 발 느린 마법사는 제외
    if(ePoke>=2 && (cand.tags.includes('dive')||k.mob>=2)){counter+=6;cNotes.push('상대 포킹 다수 → 파고들기');}
    if(eFront>=2){ // 상대 탱 다수
      if(k.antitank){counter+=8;cNotes.push('상대 탱 다수 → 안티탱(%체력/고정딜)');}
      else if(cand.cls==='marksman'&&state.lane==='adc'){counter+=4;cNotes.push('상대 탱 다수 → 지속딜로 녹이기');}
    }
    if(eBurst>=2 && (cand.cls==='tank'||k.protect)){counter+=5;cNotes.push('상대 폭딜 다수 → 보호/탱');}
    // 데미지 타입 압박(방어 아이템 관점)
    if(enemyP.ad-enemyP.ap>=2 && cand.cls==='tank'){counter+=3;}
  }

  const cw = (weights.recMode==='meta') ? 0 : W.comfort;   // 메타 최적 모드: 실력 무시
  const draftPart = (cTier*(W.tier/100) + team*(W.team/100) + counter*(W.counter/100)) * (offRole?0.80:1);
  const total = base*(cw/100) + draftPart;
  return {total, base, cTier, cWR, team, counter, teamNotes, cNotes, comfort, hasComfort, offPool:!hasComfort, cwUsed:cw, offRole};
}

function anyOwned(){ return Object.values(pool).some(p=>p&&p.comfort>0); }

/* ============ RENDER ============ */
function laneBar(){
  document.getElementById('lanebar').innerHTML=LANES.map(l=>
    `<button class="lane ${state.lane===l.k?'on':''}" onclick="setLane('${l.k}')">
      <div class="ic">${l.ic}</div><div class="nm">${l.nm}</div></button>`).join('');
}
function setLane(k){state.lane=k;laneBar();render();}

function chips(){
  const mk=(ids,side)=>ids.map(id=>{const c=byId[id];return c?
    `<span class="chip">${c.kr}<span class="cls">${CLSKR[c.cls]}</span><span class="x" onclick="rmChamp('${side}',${id})">×</span></span>`:''}).join('')
    || `<span style="font-size:11px;color:var(--dimmer)">픽 추가하면 정확도↑</span>`;
  document.getElementById('allyChips').innerHTML=mk(state.ally,'ally');
  document.getElementById('enemyChips').innerHTML=mk(state.enemy,'enemy');
  const has=state.ally.length||state.enemy.length;
  document.getElementById('clearAll').style.visibility=has?'visible':'hidden';
}
function rmChamp(side,id){state[side]=state[side].filter(x=>x!==id);chips();render();}
function clearPicks(){state.ally=[];state.enemy=[];chips();render();}

function compReadout(){
  const el=document.getElementById('compread');
  if(!state.ally.length && !state.enemy.length){el.innerHTML='라인만 골라도 추천 나온다. 보이는 픽을 넣으면 팀조합·카운터까지 반영해서 재정렬됨.';return;}
  const a=compProfile(state.ally), e=compProfile(state.enemy);
  let parts=[];
  if(state.ally.length){
    let gaps=[];
    if(!a.tank && a.frontline===0)gaps.push('탱/프론트');
    if(a.engage===0)gaps.push('이니시');
    if(a.ad-a.ap>=2)gaps.push('AP딜');
    if(a.ap-a.ad>=2)gaps.push('AD딜');
    parts.push(gaps.length?`우리팀 부족: <b>${gaps.join(', ')}</b>`:`우리팀 조합 균형 OK`);
  }
  if(state.enemy.length){
    const ek=state.enemy.map(id=>kitOf(byId[id]));
    const mobile=ek.filter(x=>x.mob>=2).length;
    const engage=ek.filter(x=>x.engage||x.aoecc).length;
    const scale=ek.filter(x=>x.curve==='late'||x.hypercarry).length;
    const poke=state.enemy.map(id=>byId[id]).filter(c=>c.tags.includes('poke')&&c.rng==='r').length;
    const tank=state.enemy.map(id=>byId[id]).filter(c=>c.cls==='tank'||c.tags.includes('frontline')).length;
    let s=[];
    if(mobile>=2)s.push('고기동 위협(확정CC 필요)');
    if(engage>=2)s.push('강한 이니시(디스인게이지)');
    if(scale>=2)s.push('후반 캐리(초반 압박)');
    if(poke>=2)s.push('포킹 위주(파고들기)');
    if(tank>=2)s.push('탱 다수(안티탱)');
    if(e.ad-e.ap>=2)s.push('AD 위주(방어구↑)');
    if(e.ap-e.ad>=2)s.push('AP 위주(마저↑)');
    parts.push(s.length?`<span class="warn">상대: ${s.join(', ')}</span>`:`상대 조합 무난`);
  }
  el.innerHTML=parts.join(' &nbsp;·&nbsp; ');
}

function render(){
  chips();compReadout();
  const owned=anyOwned();
  const mode=weights.recMode||'meta';
  document.getElementById('modeLbl').innerHTML =
    mode==='meta'     ? '기준: <b>메타 최적</b> · 실력 무시' :
    mode==='poolonly' ? '기준: <b>내 챔폭만</b>' :
                        '기준: <b>숙련 가중</b> · 내 주력 우대';
  const picked=new Set([...state.ally,...state.enemy]);
  const cands=DB.filter(c=>c.lanes.includes(state.lane)&&!picked.has(c.id))
    .filter(c=>mode!=='poolonly' || (pool[c.id]&&pool[c.id].comfort>0))
    .map(c=>({c,s:score(c)}))
    .sort((x,y)=>y.s.total-x.s.total)
    .slice(0,6);
  const box=document.getElementById('results');
  if(!cands.length){box.innerHTML=`<div class="empty">'내 챔폭만' 모드인데 이 라인에 등록한 챔이 없다.<br>⚙ 에서 챔폭을 넣거나 모드를 <b>메타 최적</b>으로 바꿔라.</div>`;return;}
  box.innerHTML=cands.map((o,i)=>{
    const c=o.c,s=o.s;
    const notes=[...s.teamNotes,...s.cNotes];
    const wrTxt = `${s.cWR.toFixed(1)}% (${wrLetter(s.cWR)})`;
    let why = notes.length? notes.map(n=>n.includes('-)')?`<span class="neg">${n}</span>`:`<b>${n}</b>`).join(' · ')
      : `승률 ${wrTxt} · ${CLSKR[c.cls]} · ${c.dmg}`;
    const tagstr = c.tags.slice(0,3).join('·');
    // mastery badge only meaningful in weighted mode with a pool set
    let badge='';
    if(s.offRole) badge+=`<span class="bd-role">부라인</span>`;
    if(mode==='weighted' && owned){
      if(s.offPool) badge+=`<span class="bd-off">챔폭 외</span>`;
      else if(s.comfort>=70) badge+=`<span class="bd-main">주력</span>`;
    }
    const showSuk = s.cwUsed>0; // 메타 최적 모드에선 숙련 항목 숨김
    const bd = (showSuk?`숙${Math.round(s.base*s.cwUsed/100)} `:'')
      +`승${Math.round(s.cTier*weights.tier/100)}`
      +(s.team?' 팀'+(s.team>0?'+':'')+Math.round(s.team*weights.team/100):'')
      +(s.counter?' 카'+(s.counter>0?'+':'')+Math.round(s.counter*weights.counter/100):'');
    return `<div class="rec ${i===0?'top1':''} ${mode==='weighted'&&owned&&s.offPool?'offpool':''}">
      <div class="rk">${i+1}</div>
      <div class="rmid">
        <div class="rname">${c.kr}${badge}</div>
        <div class="rmeta">${CLSKR[c.cls]} · ${c.dmg} · <span class="tg">${tagstr}</span> · 승률 ${wrTxt}</div>
        <div class="rwhy">${why}</div>
      </div>
      <div class="rscore">
        <div class="n mono">${Math.round(s.total)}</div>
        <div class="bd mono">${bd}</div>
      </div>
    </div>`;
  }).join('');
}

/* ============ INLINE SEARCH ============ */
let addSide='enemy';
function setAddSide(s){addSide=s;paintAddSide();renderDD();document.getElementById('mainSrch').focus();}
function paintAddSide(){
  document.getElementById('sbEnemy').className=addSide==='enemy'?'on enemy':'';
  document.getElementById('sbAlly').className=addSide==='ally'?'on ally':'';
}
function searchList(raw){
  raw=raw.trim();const ql=raw.toLowerCase(),choMode=isChoQuery(raw),cq=raw.replace(/\s/g,'');
  const picked=new Set([...state.ally,...state.enemy]);
  const match=c=>{if(!raw)return false;
    if(choMode)return c.cho.includes(cq)||c.aliasCho.some(a=>a.includes(cq));
    return c.kr.includes(raw)||c.en.toLowerCase().includes(ql)||c.cho.includes(cq)
      ||c.aliases.some(a=>a.includes(raw))||c.aliasCho.some(a=>a.includes(cq));};
  const prefix=c=>choMode
    ? (c.cho.startsWith(cq)||c.aliasCho.some(a=>a.startsWith(cq)))
    : (c.kr.startsWith(raw)||c.en.toLowerCase().startsWith(ql)||c.cho.startsWith(cq)
       ||c.aliases.some(a=>a.startsWith(raw))||c.aliasCho.some(a=>a.startsWith(cq)));
  return DB.filter(c=>!picked.has(c.id)).filter(match)
    .sort((a,b)=>{const pa=prefix(a),pb=prefix(b);if(pa!==pb)return pa?-1:1;return a.kr.localeCompare(b.kr,'ko');});
}
let ddList=[];
function renderDD(){
  const raw=document.getElementById('mainSrch').value;
  const dd=document.getElementById('dd');
  document.getElementById('sbClear').style.display=raw?'flex':'none';
  if(!raw.trim()){ddList=[];dd.classList.remove('on');dd.innerHTML='';return;}
  ddList=searchList(raw).slice(0,8);
  if(!ddList.length){dd.classList.add('on');dd.innerHTML=`<div class="ddempty">결과 없음</div>`;return;}
  const lm={top:'탑',jug:'정',mid:'미',adc:'원',sup:'서'};
  dd.classList.add('on');
  dd.innerHTML=ddList.map((c,i)=>
    `<button class="ddrow ${i===0?'first':''}" onclick="quickAdd(${c.id})">
      <span class="ddn">${c.kr}${c.aliases.length?`<span class="ddalias">${c.aliases[0]}</span>`:''}</span>
      <span class="ddm">${CLSKR[c.cls]} · ${c.lanes.map(l=>lm[l]).join('/')} · ${wrOf(c).toFixed(0)}%</span>
    </button>`).join('');
}
function quickAdd(id){
  if(state.ally.includes(id)||state.enemy.includes(id))return;
  state[addSide].push(id);
  const s=document.getElementById('mainSrch');s.value='';renderDD();
  chips();render();s.focus();
}
function clearSrch(){const s=document.getElementById('mainSrch');s.value='';renderDD();s.focus();}
document.getElementById('mainSrch').addEventListener('input',renderDD);
document.getElementById('mainSrch').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&ddList.length){e.preventDefault();quickAdd(ddList[0].id);}
  if(e.key==='Escape')clearSrch();
});

/* ============ CONFIG SHEET ============ */
let cfgLane='top';
function openCfg(){cfgLane=state.lane;renderCfg();document.getElementById('cfgScrim').classList.add('on');}
function closeCfg(){document.getElementById('cfgScrim').classList.remove('on');}
function renderCfg(){
  const wRow=(k,lbl)=>`<div class="wt"><label>${lbl}</label>
    <input type="range" min="0" max="120" value="${weights[k]}" oninput="weights.${k}=+this.value;this.nextElementSibling.textContent=this.value;render()">
    <span class="v">${weights[k]}</span></div>`;
  const laneTabs=LANES.map(l=>`<button class="${cfgLane===l.k?'on':''}" onclick="cfgLane='${l.k}';renderCfg()">${l.nm}</button>`).join('');
  const champs=DB.filter(c=>c.lanes.includes(cfgLane)).sort((a,b)=>a.kr.localeCompare(b.kr,'ko'));
  const rows=champs.map(c=>{
    const cm=(pool[c.id]&&pool[c.id].comfort)||0;
    return `<div class="poolrow ${cm===0?'off':''}">
      <div class="pn">${c.kr} <span class="pc">${CLSKR[c.cls]} · ${wrOf(c).toFixed(1)}%</span></div>
      <input type="range" min="0" max="100" step="5" value="${cm}" oninput="setComfort(${c.id},+this.value)">
      <span class="pv ${cm===0?'zero':''}" id="pv${c.id}">${cm||'–'}</span>
    </div>`;
  }).join('');
  const m=weights.recMode||'meta';
  document.getElementById('cfgBody').innerHTML=`
    <div class="grp"><div class="gl">추천 모드</div>
      <div class="scopetog">
        <button class="${m==='meta'?'on':''}" onclick="setMode('meta')">메타 최적</button>
        <button class="${m==='weighted'?'on':''}" onclick="setMode('weighted')">숙련 가중</button>
        <button class="${m==='poolonly'?'on':''}" onclick="setMode('poolonly')">내 챔폭만</button>
      </div>
      <div class="poolnote" style="margin-top:7px"><b>메타 최적</b>(기본): 실력 변수 완전히 빼고 <b>티어+팀조합+카운터로만</b> 진짜 정답 산출. 못 다루는 챔이라도 그게 최적이면 1픽으로 띄운다. &nbsp;<b>숙련 가중</b>: 아래 숙련도를 가산점으로 반영해 네 주력 우대(안 찍은 강한 챔은 '챔폭 외' 표시). &nbsp;<b>내 챔폭만</b>: 숙련도 0 초과인 챔만 후보.</div>
    </div>
    <div class="grp"><div class="gl">가중치 ${m==='meta'?'<span style="color:var(--dimmer);font-weight:500">(숙련도 항목은 메타 최적 모드에서 무시됨)</span>':''}</div>
      ${wRow('comfort','숙련도')}${wRow('tier','승률(참조)')}${wRow('team','팀 시너지')}${wRow('counter','상성/스킬')}
    </div>
    <div class="grp"><div class="gl">내 챔폭 (라인별 숙련도)</div>
      <div class="poolnote"><b>메타 최적 모드에선 안 쓰인다.</b> '숙련 가중'/'내 챔폭만' 모드용. 손에 익은 챔만 올려둬라(50=평균, 70+=주력). 숙련도 = 손에 익은 정도(승률 아님).</div>
      <div class="lanetabs">${laneTabs}</div>
      ${rows}
    </div>
    <div class="cfgbtns">
      <button onclick="clearPool()">챔폭 전체 초기화</button>
      <button onclick="resetWeights()">가중치 기본값</button>
    </div>
    <div class="savebar"><button onclick="saveCfg()">저장하고 닫기</button></div>`;
}
function setMode(m){weights.recMode=m;renderCfg();render();}
function setComfort(id,v){
  if(!pool[id])pool[id]={comfort:0};
  pool[id].comfort=v;
  const el=document.getElementById('pv'+id);
  if(el){el.textContent=v||'–';el.classList.toggle('zero',v===0);el.parentElement.classList.toggle('off',v===0);}
}
function clearPool(){if(confirm('등록한 챔폭 숙련도를 전부 0으로 초기화한다. 계속?')){pool={};renderCfg();render();}}
function resetWeights(){const rm=weights.recMode;weights={comfort:80,tier:45,team:100,counter:100,recMode:rm,wv:2};renderCfg();render();}
async function saveCfg(){await saveStore();closeCfg();render();toast('저장 완료');}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1400);}

/* close config sheet on scrim tap */
document.getElementById('cfgScrim').addEventListener('click',e=>{if(e.target.id==='cfgScrim')closeCfg();});

/* ============ INIT ============ */
(async function(){
  await loadStore();
  paintAddSide();
  laneBar();render();
})();
</script>
</body>
